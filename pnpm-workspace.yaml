# Aprobación de scripts de build de dependencias.
#
# pnpm 10+ no corre los build scripts de dependencias por defecto (seguridad);
# en CI un build "sin decidir" hace fallar la instalacion con
# ERR_PNPM_IGNORED_BUILDS. pnpm 11 usa este mapa `allowBuilds` (true/false por
# paquete) -- NO `onlyBuiltDependencies`.
#   esbuild         -> vitest y drizzle-kit
#   sharp           -> optimizacion de imagenes de Next
#   unrs-resolver   -> resolver de eslint
#   @swc/core       -> toolchain (transitivo, binarios prebuilt)
#   @parcel/watcher -> watcher (transitivo, binarios prebuilt)
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
